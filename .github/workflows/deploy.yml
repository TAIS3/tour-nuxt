name: Deploy Nuxt3 to Server

on:
  push:
    branches:
      - main  # 监听 main 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 准备 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖并构建
      - name: Install & Build
        run: |
          npm install
          npm run build

      # 4. 打包构建产物
      - name: Compress output
        run: tar -czf release.tar.gz .output

      # 5. 上传压缩包到服务器
      - name: Upload via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "release.tar.gz"
          target: "/www/wwwroot/eztripcn-nuxt/"

      # 6. 远程指挥服务器：解压 & 重启
      - name: Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 【关键步骤】必须先进入项目目录！
            # 不进目录的话，后面的 ecosystem.config.js 根本找不到
            cd /www/wwwroot/eztripcn-nuxt/
            
            # 解压新包 (覆盖旧的 .output)
            tar -xzf release.tar.gz
            
            # 删掉压缩包
            rm release.tar.gz
            
            # 【核心修改】使用配置文件启动/重载
            # reload: 平滑重启，用户无感知
            # --update-env: 确保如果改了端口等配置能生效
            # || start: 如果是第一次运行或服务挂了，则执行启动
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            
            # 保存当前进程列表 (防服务器重启后丢失)
            pm2 save